# Prometheus: бот (FastAPI /metrics), Docker (cAdvisor), хост (node_exporter), self-scrape.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: college_bot_fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["bot:8090"]
        labels:
          service: college-bot

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: docker-containers

  - job_name: node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: host
